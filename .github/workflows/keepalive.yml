name: Keepalive — Streamlit Cloud

# Pinea la app cada 4 horas (6 veces por día) para evitar que Streamlit Cloud
# la duerma por inactividad (umbral de la plataforma: 7 días sin tráfico).
# Si la app está durmiendo al momento del ping, reintenta hasta 3 veces
# esperando que despierte antes de dar el job por finalizado.
#
# Horarios UTC → ART (UTC-3):
#   00:00 → 21:00 | 04:00 → 01:00 | 08:00 → 05:00
#   12:00 → 09:00 | 16:00 → 13:00 | 20:00 → 17:00

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'   # cada 4 horas
  workflow_dispatch:                     # disparo manual desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app — con reintentos si está despertando
        run: |
          URL="https://sailing-bk-operaciones.streamlit.app/"
          echo "Pinging $URL ..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL")
            echo "Intento $i — HTTP status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App activa y respondiendo."
              exit 0
            fi
            echo "App durmiendo o iniciando (status $STATUS) — esperando 30s antes de reintentar..."
            sleep 30
          done
          echo "App no respondió con 200 en 3 intentos — puede estar despertando en background."
          exit 0
